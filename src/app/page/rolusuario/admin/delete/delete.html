<div class="container py-3">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      @if (loading()) {
        <div class="text-center py-3"><div class="spinner-border text-secondary" role="status"><span class="visually-hidden">Cargando...</span></div></div>
      }

      @if (error()) {
        <div class="alert alert-danger">{{ error() }}</div>
      }

      @if (!loading() && !error() && rolusuario()) {
        <div class="alert alert-warning">
          <h4>Eliminar rol de usuario</h4>
          <p>¿Está seguro de que desea eliminar el siguiente rol de usuario?</p>
          <div class="card">
            <div class="card-body">
              <div><strong>ID:</strong> {{ rolusuario()?.id }}</div>
              <div><strong>Descripción:</strong> {{ rolusuario()?.descripcion }}</div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
          <button class="btn btn-outline-secondary" (click)="onCancel()">Cancelar</button>
          <button 
            class="btn btn-danger" 
            (click)="onDelete()" 
            [disabled]="deleting()"
          >
            @if (deleting()) { <span class="spinner-border spinner-border-sm me-2"></span> }
            Eliminar
          </button>
        </div>
      }
    </div>
  </div>
</div>
