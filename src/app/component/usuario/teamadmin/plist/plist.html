<div class="container my-2">
  <div class="d-flex justify-content-center my-3">
    <h1 class="mb-0"><i class="bi bi-people me-2" aria-hidden="true"></i>Usuarios de mi equipo</h1>
  </div>

  <div class="d-flex justify-content-between align-items-center gap-2 mb-3 flex-wrap">
    <small class="text-muted">Total registros: {{ totalRecords() || 0 }}</small>
  </div>

  <div class="mb-3">
    <input
      type="text"
      class="form-control"
      placeholder="Buscar por nombre..."
      (input)="onSearchNombre($any($event.target).value)"
    />
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered table-sm w-100">
      <thead>
        <tr>
          <th scope="col" (click)="onOrder('id')" style="cursor: pointer; width: 8%">ID</th>
          <th scope="col" (click)="onOrder('nombre')" style="cursor: pointer; width: 30%">Nombre</th>
          <th scope="col" (click)="onOrder('username')" style="cursor: pointer; width: 35%">Username</th>
          <th scope="col" class="text-center" style="width: 15%">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (oUsuario of oPage()?.content; track oUsuario.id) {
          <tr (click)="onSelect(oUsuario)" [style.cursor]="isDialogMode() ? 'pointer' : 'default'">
            <th scope="row" class="text-center">{{ oUsuario.id }}</th>
            <td>{{ oUsuario.nombre }}</td>
            <td>{{ oUsuario.username }}</td>
            <td class="text-center">
              <app-botonera-actions-plist [id]="oUsuario.id" strEntity="usuario"></app-botonera-actions-plist>
            </td>
          </tr>
        }
        @empty {
          <tr>
            <td colspan="4" class="text-center text-muted py-3">No se encontraron registros</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <app-paginacion
    [numPage]="numPage()"
    [numPages]="oPage()?.totalPages || 1"
    (pageChange)="goToPage($event)"
  ></app-paginacion>
</div>
