<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card mt-4">
        <div class="card-header">
          <h3 class="mb-0">Eliminar usuario</h3>
        </div>
        <div class="card-body">
          <p>
            ¿Está seguro de que desea eliminar el usuario
            <strong *ngIf="usuario()">{{ usuario()?.nombre }} {{ usuario()?.apellido1 }} {{ usuario()?.apellido2 }}</strong>
            (ID <strong>{{ id_usuario() }}</strong>)?
          </p>
          <p class="text-danger" *ngIf="error()">{{ error() }}</p>
        </div>
        <div class="card-footer d-flex justify-content-end gap-2">
          <button class="btn btn-secondary" (click)="doCancel()">Cancelar</button>
          <button class="btn btn-danger" (click)="doDelete()">Eliminar</button>
        </div>
      </div>
    </div>
  </div>
</div>
