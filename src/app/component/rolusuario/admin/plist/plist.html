<div class="container my-2">
  <div class="d-flex justify-content-center my-3">
    <h1 class="mb-0"><i class="bi bi-shield-check me-2" aria-hidden="true"></i>Roles de Usuario</h1>
  </div>

  <div class="d-flex justify-content-between align-items-center gap-2 mb-3 flex-wrap">
    <small class="text-muted">Total registros: {{ totalRecords() || 0 }}</small>
    <a
      class="btn btn-primary"
      routerLink="/rolusuario/new"
      role="button"
      >
      <i class="bi bi-plus-circle"></i>
      <span class="d-none d-sm-inline">Crear rol de usuario</span>
    </a>
  </div>

  <div class="mb-3">
    <input
      type="text"
      class="form-control"
      placeholder="Buscar por descripción..."
      (input)="onSearchDescripcion($any($event.target).value)"
    />
  </div>

  <div class="table-responsive">
    <table class="table table-striped table-bordered table-sm w-100">
      <thead>
        <tr>
          <th scope="col" (click)="onOrder('id')" style="cursor: pointer; width: 8%">ID</th>
          <th scope="col" (click)="onOrder('descripcion')" style="cursor: pointer; width: 60%">Descripción</th>
          <th scope="col" class="text-center" style="width: 15%">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for (oRolusuario of oPage()?.content; track oRolusuario.id) {
          <tr (click)="onSelect(oRolusuario)" [style.cursor]="isDialogMode() ? 'pointer' : 'default'">
            <th scope="row" class="text-center">{{ oRolusuario.id }}</th>
            <td>{{ oRolusuario.descripcion }}</td>
            <td class="text-center">
              <app-botonera-actions-plist [id]="oRolusuario.id" strEntity="rolusuario"></app-botonera-actions-plist>
            </td>
          </tr>
        }
        @empty {
          <tr>
            <td colspan="3" class="text-center text-muted py-3">No se encontraron registros</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <app-paginacion
    [numPage]="numPage()"
    [numPages]="oPage()?.totalPages || 1"
    (pageChange)="goToPage($event)"
  ></app-paginacion>
</div>
